name: CI
on: [push, pull_request]
jobs:
  build:
    strategy:
      matrix:
        node:
        - "10"
        - "8"
    steps:
    - uses: actions/checkout@v1
    - name: Set up Node
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node }}
    - run: npm install
    - run: npm run build
